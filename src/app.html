<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link
			id="theme-favicon"
			rel="icon"
			href="%sveltekit.assets%/brand/bendavis-white-brandmark.svg"
			type="image/svg+xml"
			data-light-href="%sveltekit.assets%/brand/bendavis-black-brandmark.svg"
			data-dark-href="%sveltekit.assets%/brand/bendavis-white-brandmark.svg"
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/Geist[wght].woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/GeistMono[wght].woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>

		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(() => {
				const storageKey = 'theme-preference';
				const root = document.documentElement;
				const favicon = document.querySelector('#theme-favicon');
				const applyTheme = (theme) => {
					root.dataset.theme = theme;
					root.style.colorScheme = theme;

					const faviconHref =
						theme === 'light' ? favicon?.dataset.lightHref : favicon?.dataset.darkHref;
					if (faviconHref) favicon.href = faviconHref;
				};

				try {
					const storedTheme = localStorage.getItem(storageKey);
					const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const theme =
						storedTheme === 'light' || storedTheme === 'dark'
							? storedTheme
							: prefersDark
								? 'dark'
								: 'light';

					applyTheme(theme);
				} catch {
					applyTheme('dark');
				}
			})();
		</script>
		<style>
			html,
			body {
				min-height: 100%;
				margin: 0;
			}

			body {
				background-color: #0b0d10;
				color: #e5e7eb;
			}

			html[data-theme='light'] body {
				background-color: #fafaf8;
				color: #0b0d10;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
